# .readthedocs.yaml
# Read the Docs configuration file
# See https://docs.readthedocs.io/en/stable/config-file/v2.html for details

version: 2

build:
  os: ubuntu-22.04
  tools:
    python: "3.11"
  apt_packages:
    - pandoc
  jobs:
    # Initialise the documentation submodules ourselves, sparse-checked-out to
    # each subpackage's docs/ only. We intentionally do NOT set a `submodules:`
    # key below, because RTD's native submodule support cannot do a sparse
    # checkout. See scripts/rtd-post-checkout.sh for details.
    post_checkout:
      - bash scripts/rtd-post-checkout.sh

sphinx:
  configuration: docs/source/conf.py

python:
  install:
    # Install jupyter-ai with its `docs` extra — the single source of truth for
    # documentation build dependencies (see [project.optional-dependencies] in
    # pyproject.toml).
    - method: pip
      path: .
      extra_requirements:
        - docs
