name: "Step 0: Prep release documentation"

# Generates the docs "Releases" page for a new version and opens it as a draft
# PR against the target branch. The docs Releases section — not Jupyter
# Releaser's changelog and not the GitHub release — is the source of truth for
# Jupyter AI release notes.
#
# This is a thin wrapper: all the work lives in scripts/generate_release_notes.py
# so it runs identically locally and here. The script resolves, per submodule,
# the PR window between its version floor at the previous release and its floor
# at this version (from pyproject.toml), and reuses Jupyter Releaser's own
# changelog builder to aggregate PRs + contributors.
#
# Run this as "Step 0", before "Step 1: Prep Release": the new version's floors
# must already be bumped in the target branch's pyproject.toml (see the
# prep-jupyter-ai-release tooling), since the script reads them from the
# working tree.

on:
  workflow_dispatch:
    inputs:
      version:
        description: "New version being released, e.g. v3.1.0 or v3.0.4"
        required: true
      target-branch:
        description: >-
          Branch to target. Patch releases of older minors are cut from
          maintenance branches (e.g. 3.0.x), not always main. The docs PR is
          opened against this branch.
        required: true
        default: "main"

permissions: {}

concurrency:
  group: prep-release-docs-${{ github.event.inputs.version }}
  cancel-in-progress: false

jobs:
  prep-release-docs:
    name: Generate release-notes page and open draft PR
    runs-on: ubuntu-latest
    permissions:
      contents: write # push the release-notes branch
      pull-requests: write # open the draft PR
    steps:
      - name: Checkout target branch
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.event.inputs.target-branch }}
          # Full history + tags so the script can resolve the previous release
          # tag reachable on the target branch and read its pyproject.toml.
          fetch-depth: 0
          # Credentials are not persisted; the push below authenticates
          # explicitly with the ephemeral GITHUB_TOKEN.
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"

      - name: Install generator dependencies
        # packaging: floor/tag resolution. jupyter-releaser + github-activity:
        # the reused PR aggregation. tomli: TOML parsing (tomllib is stdlib on
        # 3.11 but tomli keeps the script portable to 3.10).
        run: pip install packaging jupyter-releaser github-activity tomli

      - name: Generate release-notes page
        env:
          # The generator uses the token for the GitHub search/PR API. The
          # built-in token is sufficient for public read + label lookups.
          GITHUB_TOKEN: ${{ github.token }}
          # Pass workflow inputs via env (not inline ${{ }} in run:) so an
          # attacker-controllable value can't be expanded into the shell.
          VERSION: ${{ github.event.inputs.version }}
          TARGET_BRANCH: ${{ github.event.inputs.target-branch }}
        run: |
          python scripts/generate_release_notes.py \
            --version "$VERSION" \
            --target-branch "$TARGET_BRANCH"

      - name: Open draft PR
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ github.event.inputs.version }}
          TARGET_BRANCH: ${{ github.event.inputs.target-branch }}
        run: |
          set -euo pipefail

          if git diff --quiet && git diff --cached --quiet; then
            echo "No release-notes changes generated; nothing to open a PR for."
            exit 0
          fi

          # Normalize the version to a v-prefix for branch/title consistency.
          case "$VERSION" in
            v*) V="$VERSION" ;;
            *) V="v$VERSION" ;;
          esac
          BRANCH="release-docs/${V}"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git checkout -b "$BRANCH"
          git add docs/source/releases
          git commit -m "docs: add release notes for ${V}"

          git push --force-with-lease \
            "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" \
            "HEAD:${BRANCH}"

          # Reuse an open PR for this branch if one exists; otherwise open a
          # fresh draft PR against the target branch.
          if gh pr view "$BRANCH" --json state --jq .state >/dev/null 2>&1; then
            echo "A PR for ${BRANCH} already exists; branch updated."
          else
            gh pr create \
              --draft \
              --base "$TARGET_BRANCH" \
              --head "$BRANCH" \
              --title "docs: add release notes for ${V}" \
              --body "Adds the \`Releases\` documentation page for **${V}**, generated by \`scripts/generate_release_notes.py\` (\"Step 0: Prep release documentation\"). Review the aggregated per-subpackage PRs and contributors before merging."
          fi
