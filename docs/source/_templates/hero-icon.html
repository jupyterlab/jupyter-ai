<style>
.hero-banner {
  display: flex;
  align-items: center;
  justify-content: center;

}

/* The visible window: shows 3 icons (3 × 72px = 216px) */
.icon-column {
  width: 64px;
  height: 216px;       /* 3 icons × 72px (56px icon + 16px margin) */
  overflow: hidden;
  position: relative;
}

.icon-strip {
  display: flex;
  flex-direction: column;
  will-change: transform; /* promotes to own compositing layer for smoother animation */
}

.icon-strip.animating {
  transition: transform 0.4s ease-in-out;
}

.icon-strip img {
  width: 56px;
  height: 56px;
  margin: 8px 4px;       /* total height per icon slot = 56 + 8 + 8 = 72px */
  object-fit: contain;
  filter: brightness(0) saturate(100%); /* renders all icons as dark monochrome */
  opacity: 0.7;
  flex-shrink: 0;
}

.hero-logo img {
  width: 180px;
}

.hero-logo .dark-logo {
  display: none;
}

.dark .hero-logo .light-logo {
  display: none;
}

.dark .hero-logo .dark-logo {
  display: block;
}

.hero-pipes {
  display: flex;
  align-items: center;
}

/* SVG connector pipes between icon columns and the Jupyter logo */
.hero-pipes svg.pipes {
  width: 80px;
  height: 216px;
}

.pipes path {
  fill: none;
  stroke: #ccc;
  stroke-width: 2;
}

@media (prefers-color-scheme: dark) {
  .pipes path {
    stroke: #555;
  }
  .icon-strip img {
    filter: brightness(0) saturate(100%) invert(1);
  }
}

.dark .pipes path {
  stroke: #555;
}
.dark .icon-strip img {
  filter: brightness(0) saturate(100%) invert(1);
}

<script>
// Animation driven entirely by JS + CSS transitions to avoid Safari's
// keyframe flash bug (Safari briefly resets to 0% keyframe when
// animationiteration fires and a CSS variable is updated).
(function() {
  var ICON_H = 72;
  var HOLD_MS = 1200;  // time to hold each icon before sliding
  var LEFT_COUNT = 14;
  var RIGHT_COUNT = 7;

  function initStrip(id, count, direction) {
    var strip = document.getElementById(id);
    // direction: 1 = scroll up (pos increases), -1 = scroll down (pos decreases)
    var pos = (direction === -1) ? count : 0;
    strip.style.transform = 'translateY(' + (-pos * ICON_H) + 'px)';

    function tick() {
      strip.classList.add('animating');
      var nextPos = pos + direction;
      strip.style.transform = 'translateY(' + (-nextPos * ICON_H) + 'px)';

      strip.addEventListener('transitionend', function onEnd() {
        strip.removeEventListener('transitionend', onEnd);
        strip.classList.remove('animating');

        pos = nextPos;

        if (direction === 1 && pos >= count) {
          pos = 0;
          strip.style.transform = 'translateY(0px)';
        } else if (direction === -1 && pos <= 0) {
          pos = count;
          strip.style.transform = 'translateY(' + (-pos * ICON_H) + 'px)';
        }

        setTimeout(tick, HOLD_MS);
      });
    }

    setTimeout(tick, HOLD_MS);
  }

  initStrip('left-strip', LEFT_COUNT, 1);
  initStrip('right-strip', RIGHT_COUNT, -1);
})();
</script>
