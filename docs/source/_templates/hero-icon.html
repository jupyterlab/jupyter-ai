<!-- See HERO-ICON-README.md for full documentation on how this animation works. -->

<style>
.hero-banner {
  display: flex;
  align-items: center;
  justify-content: center;
  margin-bottom: 1rem;
}

/* The visible window: shows 3 icons (3 × 72px = 216px) */
.icon-column {
  width: 64px;
  height: 216px;       /* 3 icons × 72px (56px icon + 16px margin) */
  overflow: hidden;
  position: relative;
}

.icon-strip {
  display: flex;
  flex-direction: column;
  animation: tick-up 2s ease-in-out infinite;
  will-change: transform; /* promotes to own compositing layer for smoother animation */
}

.icon-strip img {
  width: 56px;
  height: 56px;
  margin: 8px 4px;       /* total height per icon slot = 56 + 8 + 8 = 72px */
  object-fit: contain;
  filter: brightness(0) saturate(100%); /* renders all icons as dark monochrome */
  opacity: 0.7;
  flex-shrink: 0;
}

/* Tick UP: hold, then slide up by one icon height */
@keyframes tick-up {
  0%, 60% { transform: translateY(var(--offset)); }
  80%, 100% { transform: translateY(calc(var(--offset) - 72px)); }
}

/* Tick DOWN: hold, then slide down by one icon height */
@keyframes tick-down {
  0%, 60% { transform: translateY(var(--offset)); }
  80%, 100% { transform: translateY(calc(var(--offset) + 72px)); }
}

.hero-logo img {
  width: 180px;
}

.hero-logo .dark-logo {
  display: none;
}

.dark .hero-logo .light-logo {
  display: none;
}

.dark .hero-logo .dark-logo {
  display: block;
}

.hero-pipes {
  display: flex;
  align-items: center;
}

/* SVG connector pipes between icon columns and the Jupyter logo */
.hero-pipes svg.pipes {
  width: 80px;
  height: 216px;
}

.pipes path {
  fill: none;
  stroke: #ccc;
  stroke-width: 2;
}

@media (prefers-color-scheme: dark) {
  .pipes path {
    stroke: #555;
  }
  .icon-strip img {
    filter: brightness(0) saturate(100%) invert(1);
  }
}

.dark .pipes path {
  stroke: #555;
}
.dark .icon-strip img {
  filter: brightness(0) saturate(100%) invert(1);
}
</style>

<script>
(function() {
  var iconH = 72;  // height per icon slot: 56px icon + 8px margin top + 8px margin bottom
  var leftCount = 14;  // number of unique language/library icons
  var rightCount = 6;  // number of unique AI provider icons

  // LEFT STRIP: ticks UP
  // Starts at position 0 (top of copy 1). Each tick moves up by one icon.
  // When it reaches the end of copy 1, JS resets to position 0 (start of copy 1).
  // Copy 2 below ensures the last tick has an icon to show before the reset.
  var left = document.getElementById('left-strip');
  var lStep = 0;
  left.style.setProperty('--offset', '0px');
  left.addEventListener('animationiteration', function() {
    lStep++;
    if (lStep >= leftCount) lStep = 0;
    left.style.setProperty('--offset', (-lStep * iconH) + 'px');
  });

  // RIGHT STRIP: ticks DOWN
  // Starts at position `rightCount` (first icon of copy 2, the middle copy).
  // Each tick slides down by +72px, then JS decrements rPos (moving the
  // resting position one icon higher). When rPos reaches 0 (top of copy 1),
  // JS jumps back to position `rightCount` (same visual position in copy 2).
  // Copy 1 above is the pre-rendered buffer that prevents the rendering glitch.
  var right = document.getElementById('right-strip');
  var rPos = rightCount;
  right.style.setProperty('--offset', (-rPos * iconH) + 'px');
  right.style.animationName = 'tick-down';
  right.addEventListener('animationiteration', function() {
    rPos--;
    if (rPos <= 0) rPos = rightCount;
    right.style.setProperty('--offset', (-rPos * iconH) + 'px');
  });
})();
</script>
